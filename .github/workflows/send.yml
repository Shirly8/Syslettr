name: Send Systems Design Email

on:
  schedule:
    - cron: "0 8 */3 * *"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browser
        run: python -m playwright install chromium --with-deps

      - name: Check email credentials
        env:
          GMAIL_SMTP: ${{ secrets.GMAIL_SMTP }}
          SENDER: ${{ secrets.SENDER }}
          RECEIVER: ${{ secrets.RECEIVER }}
        run: |
          python -c "
          import smtplib, os
          sender = os.environ['SENDER']
          pwd = os.environ['GMAIL_SMTP']
          print(f'SENDER length: {len(sender)}')
          print(f'GMAIL_SMTP length: {len(pwd)}')
          with smtplib.SMTP('smtp.gmail.com', 587) as s:
              s.starttls()
              s.login(sender, pwd)
          print('SMTP login successful')
          "

      - name: Run
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_SMTP: ${{ secrets.GMAIL_SMTP }}
          SENDER: ${{ secrets.SENDER }}
          RECEIVER: ${{ secrets.RECEIVER }}
          CLAUDE_MODEL: claude-sonnet-4-6
        run: python generate.py

      - name: Commit toc.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add toc.json generated/
          git diff --staged --quiet || git commit -m "chore: email sent [skip ci]"
          git push
